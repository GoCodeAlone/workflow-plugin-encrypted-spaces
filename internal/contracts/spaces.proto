syntax = "proto3";

package workflow.plugins.encryptedspaces.v1;

option go_package = "github.com/GoCodeAlone/workflow-plugin-encrypted-spaces/internal/contracts";

message SpaceStoreConfig {
  string space_id = 1;
  string backend = 2;
  uint64 max_operations = 3;
}

message VerifierConfig {
  string mode = 1;
  bool allow_fake = 2;
}

message RetentionPolicy {
  uint32 max_operations = 1;
  uint64 min_key_epoch = 2;
  uint64 min_membership_epoch = 3;
}

message EncryptedOperation {
  string space_id = 1;
  string member_id = 2;
  string device_id = 3;
  string operation_id = 4;
  uint64 key_epoch = 5;
  uint64 membership_epoch = 6;
  bytes ciphertext = 7;
  bytes nonce = 8;
  bytes associated_data = 9;
  int64 created_at_unix_nano = 10;
}

message OperationCommitment {
  string space_id = 1;
  string operation_id = 2;
  uint64 sequence = 3;
  string digest = 4;
  uint64 key_epoch = 5;
  uint64 membership_epoch = 6;
  uint64 ciphertext_size = 7;
}

message FastForwardCheckpoint {
  string space_id = 1;
  uint64 through_sequence = 2;
  string operation_id = 3;
  string digest = 4;
  uint64 key_epoch = 5;
  uint64 membership_epoch = 6;
}

message VerificationReport {
  string operation_id = 1;
  string digest = 2;
  bool accepted = 3;
  bool production_ready = 4;
  string mode = 5;
}

message AppendConfig {
  RetentionPolicy retention = 1;
  bool allow_fake_verifier = 2;
}

message AppendInput {
  EncryptedOperation operation = 1;
}

message AppendOutput {
  OperationCommitment commitment = 1;
  VerificationReport verification = 2;
}

message FastForwardConfig {}

message FastForwardInput {
  OperationCommitment commitment = 1;
  FastForwardCheckpoint checkpoint = 2;
}

message FastForwardOutput {
  bool accepted = 1;
  string status = 2;
}

message EpochRotateConfig {}

message EpochRotateInput {
  string space_id = 1;
  uint64 current_key_epoch = 2;
  string reason = 3;
}

message EpochRotateOutput {
  uint64 key_epoch = 1;
  string reason = 2;
}

message MemberUpdateConfig {}

message MemberUpdateInput {
  string space_id = 1;
  repeated string members = 2;
  string member_id = 3;
  string action = 4;
  string reason = 5;
}

message MemberUpdateOutput {
  uint64 membership_epoch = 1;
  bool member_allowed = 2;
  string action = 3;
}

message VerifyMembershipConfig {}

message VerifyMembershipInput {
  string group_id = 1;
  string member_id = 2;
  string issuer = 3;
  int64 expires_at = 4;
  string proof_digest = 5;
  string upstream_path = 6;
}

message VerifyMembershipOutput {
  VerificationReport report = 1;
}

message VerifyOperationConfig {}

message VerifyOperationInput {
  string transcript_id = 1;
  string statement_id = 2;
  string witness_hash = 3;
  string proof_digest = 4;
  string upstream_path = 5;
}

message VerifyOperationOutput {
  VerificationReport report = 1;
}

message VerifyCheckpointConfig {}

message VerifyCheckpointInput {
  string checkpoint_id = 1;
  string tree_head = 2;
  uint64 tree_size = 3;
  string proof_digest = 4;
  string upstream_path = 5;
}

message VerifyCheckpointOutput {
  VerificationReport report = 1;
}

message VectorReportConfig {
  repeated string required_domains = 1;
  bool require_production_equivalence = 2;
}

message VectorReportInput {}

message VectorCoverageRow {
  string domain = 1;
  string status = 2;
  string vector = 3;
  string reason = 4;
  string notes = 5;
}

message VectorReportOutput {
  string upstream_tag = 1;
  bool production_equivalent = 2;
  repeated VectorCoverageRow rows = 3;
  repeated string deferred_domains = 4;
  string status = 5;
}
