modules:
  - name: encrypted_space_store
    type: encrypted_space.store
    config:
      typed:
        space_id: space-1
        backend: memory
        max_operations: 128
  - name: encrypted_space_verifier
    type: encrypted_space.verifier
    config:
      typed:
        mode: fake
        allow_fake: true

workflows:
  - name: encrypted_space_append
    steps:
      - name: append
        type: step.encrypted_space_append
      - name: vector_report
        type: step.encrypted_space_vector_report
        config:
          typed:
            required_domains:
              - zkgroup
              - message-backup
            require_production_equivalence: false
      - name: emit
        type: step.eventbus_publish
      - name: audit
        type: step.audit_record
